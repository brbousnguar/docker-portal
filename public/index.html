<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Brahim - System Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="dashboard-shell">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="m16 16-4-4 4-4"/><path d="M8 8v8"/><path d="M4 20h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/></svg>
            <div class="logo-text">
              <h1>Portal Brahim</h1>
              <span class="version-tag">Local Engine</span>
            </div>
          </div>
          
          <div class="search-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input
              id="searchInput"
              type="search"
              placeholder="Search apps..."
              autocomplete="off"
            />
          </div>
        </div>

        <div class="sidebar-bottom">
          <button id="refreshButton" class="btn btn-primary btn-block">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Refresh Services
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="top-nav">
          <div class="nav-metrics">
            <div class="metric">
              <span class="metric-label">Active Applications</span>
              <strong id="appCount" class="metric-value">0</strong>
            </div>
            <div class="metric-divider"></div>
            <div class="metric">
              <span class="metric-label">Last Synchronization</span>
              <strong id="updatedAt" class="metric-value">Waiting...</strong>
            </div>
          </div>
        </header>

        <section id="errorBox" class="state-message error hidden"></section>
        <section id="emptyState" class="state-message hidden">
          <div class="empty-icon-wrapper">
             <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
          </div>
          <h3>System Idle</h3>
          <p>No active Docker containers with exposed web ports were detected.</p>
        </section>

        <div class="grid-container">
          <section id="grid" class="app-grid"></section>
        </div>
      </main>
    </div>

    <!-- Application Card Template -->
    <template id="appCardTemplate">
      <article class="app-card">
        <div class="card-glow"></div>
        <div class="card-inner">
          <header class="app-header">
            <div class="app-branding">
              <span class="app-project"></span>
              <h2 class="app-title"></h2>
            </div>
            <div class="status-badge running" title="Container is running">
              <span class="status-dot"></span>
              <span class="status-text">Running</span>
            </div>
          </header>

          <div class="app-details">
            <div class="detail-row">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="detail-icon"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></svg>
              <div class="detail-content">
                <span class="detail-label">Container Image</span>
                <span class="detail-value app-image font-mono"></span>
              </div>
            </div>
            <div class="detail-row">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="detail-icon"><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><line x1="6" x2="6.01" y1="18" y2="18"/><line x1="6" x2="6.01" y1="6" y2="6"/></svg>
              <div class="detail-content">
                <span class="detail-label">Local Port Mapping</span>
                <span class="detail-value app-port font-mono"></span>
              </div>
            </div>
            <div class="detail-row">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="detail-icon"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/></svg>
              <div class="detail-content">
                <span class="detail-label">Resources</span>
                <span class="detail-value app-resources font-mono"></span>
              </div>
            </div>
          </div>

          <footer class="app-actions">
            <a class="btn btn-primary app-link" target="_blank" rel="noreferrer">
              <span class="link-text">Open the webapp</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
            <button class="btn btn-secondary app-copy" type="button" title="Copy URL">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            </button>
          </footer>
        </div>
      </article>
    </template>

    <script>
      const state = {
        apps: [],
        query: "",
      };

      const elements = {
        appCount: document.getElementById("appCount"),
        updatedAt: document.getElementById("updatedAt"),
        errorBox: document.getElementById("errorBox"),
        emptyState: document.getElementById("emptyState"),
        grid: document.getElementById("grid"),
        refreshButton: document.getElementById("refreshButton"),
        searchInput: document.getElementById("searchInput"),
        template: document.getElementById("appCardTemplate"),
      };

      function formatTime(value) {
        return new Date(value).toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function render() {
        const query = state.query.trim().toLowerCase();
        const apps = state.apps.filter((app) => {
          if (!query) return true;
          return [app.name, app.project, app.service, app.image, app.containerName]
            .filter(Boolean)
            .some((value) => value.toLowerCase().includes(query));
        });

        elements.grid.innerHTML = "";
        
        // Count animation
        const currentCount = parseInt(elements.appCount.textContent) || 0;
        elements.appCount.textContent = String(apps.length);
        
        if(currentCount !== apps.length) {
           elements.appCount.classList.add('flash');
           setTimeout(() => elements.appCount.classList.remove('flash'), 300);
        }

        elements.emptyState.classList.toggle("hidden", apps.length !== 0);

        for (const [index, app] of apps.entries()) {
          const fragment = elements.template.content.cloneNode(true);
          const article = fragment.querySelector('.app-card');
          article.style.animationDelay = `${index * 0.05}s`;

          fragment.querySelector(".app-project").textContent = app.project || "Standalone Stack";
          fragment.querySelector(".app-title").textContent = app.name;
          fragment.querySelector(".app-image").textContent = app.image.split(':')[0]; // Truncate tag if too long? Just base image looks cleaner
          fragment.querySelector(".app-port").textContent = app.port + " → " + app.internalPort;
          fragment.querySelector(".app-resources").textContent = app.cpu + " CPU • " + app.ram;

          // Status badge handling (mocked up logic: assuming if it's there, it's running)
          const badge = fragment.querySelector(".status-badge");
          if(app.status && app.status.toLowerCase().includes("exited")) {
              badge.classList.remove("running");
              badge.classList.add("stopped");
              badge.querySelector(".status-text").textContent = "Stopped";
          }

          const link = fragment.querySelector(".app-link");
          link.href = app.url;
          
          const copyBtn = fragment.querySelector(".app-copy");
          copyBtn.addEventListener("click", async () => {
             await navigator.clipboard.writeText(app.url);
             // Visual feedback
             copyBtn.classList.add("success");
             setTimeout(() => copyBtn.classList.remove("success"), 1000);
          });

          elements.grid.appendChild(fragment);
        }
      }

      async function loadApps() {
        elements.errorBox.classList.add("hidden");
        const isRefresh = document.activeElement === elements.refreshButton;
        if(isRefresh) {
            elements.refreshButton.classList.add('loading');
        }

        try {
          const response = await fetch("/api/apps", { cache: "no-store" });
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.details || payload.error || "Unknown error");
          }

          state.apps = payload.apps;
          elements.updatedAt.textContent = formatTime(payload.generatedAt);
          elements.updatedAt.classList.add('flash');
          setTimeout(() => elements.updatedAt.classList.remove('flash'), 300);
          
          render();
        } catch (error) {
          state.apps = [];
          render();
          elements.errorBox.innerHTML = `<strong>Error Connecting:</strong> ${error.message}`;
          elements.errorBox.classList.remove("hidden");
          elements.updatedAt.textContent = "Unavailable";
        } finally {
          if(isRefresh) {
            elements.refreshButton.classList.remove('loading');
          }
        }
      }

      elements.refreshButton.addEventListener("click", loadApps);
      elements.searchInput.addEventListener("input", (event) => {
        state.query = event.target.value;
        render();
      });

      loadApps();
    </script>
  </body>
</html>
